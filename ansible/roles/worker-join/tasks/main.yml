---
# worker-join role: joins worker nodes to the Kubernetes cluster
# Idempotent — skips join if node is already a member.

- name: Check if node has already joined the cluster
  ansible.builtin.stat:
    path: "{{ kubelet_conf }}"
  register: kubelet_conf_stat

- name: Slurp join command from master
  ansible.builtin.slurp:
    src: "{{ kubeadm_join_command_file }}"
  delegate_to: "{{ groups['masters'][0] }}"
  register: join_command_b64
  when: not kubelet_conf_stat.stat.exists

- name: Decode join command
  ansible.builtin.set_fact:
    kubeadm_join_cmd: "{{ join_command_b64.content | b64decode | trim }}"
  when: not kubelet_conf_stat.stat.exists

- name: Join worker node to the cluster
  ansible.builtin.command: "{{ kubeadm_join_cmd }}"
  when: not kubelet_conf_stat.stat.exists
  register: kubeadm_join_result
  changed_when: kubeadm_join_result.rc == 0

- name: Wait for node to appear as Ready
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }}
    --kubeconfig=/etc/kubernetes/admin.conf
    --no-headers
    -o custom-columns=STATUS:.status.conditions[-1].type
  delegate_to: "{{ groups['masters'][0] }}"
  register: node_status
  until: node_status.stdout == "Ready"
  retries: "{{ (node_ready_timeout / node_ready_delay) | int }}"
  delay: "{{ node_ready_delay }}"
  changed_when: false
  when: not kubelet_conf_stat.stat.exists
