---
# cni-cilium role: installs Cilium CNI via Helm on the control-plane node
# Idempotent — checks for existing Helm release before installing.

# ── Helm ──────────────────────────────────────────────────────────────────────

- name: Check if Helm is already installed
  ansible.builtin.stat:
    path: "{{ helm_binary }}"
  register: helm_stat

- name: Download Helm install script
  ansible.builtin.get_url:
    url: "{{ helm_install_script_url }}"
    dest: /tmp/get_helm.sh
    mode: "0700"
  when: not helm_stat.stat.exists

- name: Install Helm
  ansible.builtin.command: /tmp/get_helm.sh
  when: not helm_stat.stat.exists
  environment:
    HELM_INSTALL_DIR: /usr/local/bin
  changed_when: true

- name: Clean up Helm install script
  ansible.builtin.file:
    path: /tmp/get_helm.sh
    state: absent
  when: not helm_stat.stat.exists

# ── Cilium Helm repo ──────────────────────────────────────────────────────────

- name: Add Cilium Helm repository
  ansible.builtin.command: >
    {{ helm_binary }} repo add cilium {{ cilium_helm_repo }}
  register: helm_repo_add
  changed_when: "'already exists' not in helm_repo_add.stdout"
  failed_when: helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stdout
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Update Helm repositories
  ansible.builtin.command: "{{ helm_binary }} repo update"
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# ── Install Cilium ────────────────────────────────────────────────────────────

- name: Check if Cilium Helm release exists
  ansible.builtin.command: >
    {{ helm_binary }} status {{ cilium_release_name }}
    --namespace {{ cilium_namespace }}
  register: cilium_helm_status
  failed_when: false
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Install Cilium via Helm
  ansible.builtin.command: >
    {{ helm_binary }} install {{ cilium_release_name }} cilium/cilium
    --version {{ cilium_chart_version }}
    --namespace {{ cilium_namespace }}
    --set hubble.relay.enabled={{ hubble_relay_enabled | lower }}
    --set hubble.ui.enabled={{ hubble_ui_enabled | lower }}
    --set ipam.mode={{ cilium_ipam_mode }}
    --set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_cidr }}
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ ansible_host }}
    --set k8sServicePort=6443
    --set operator.replicas=1
  when: cilium_helm_status.rc != 0
  changed_when: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for Cilium DaemonSet to roll out
  ansible.builtin.command: >
    kubectl rollout status daemonset/cilium
    --namespace {{ cilium_namespace }}
    --timeout={{ cilium_ready_timeout }}s
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for Cilium operator Deployment to roll out
  ansible.builtin.command: >
    kubectl rollout status deployment/cilium-operator
    --namespace {{ cilium_namespace }}
    --timeout={{ cilium_ready_timeout }}s
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

# ── Cilium CLI ────────────────────────────────────────────────────────────────

- name: Check if Cilium CLI is already installed
  ansible.builtin.stat:
    path: "{{ cilium_cli_binary }}"
  register: cilium_cli_stat

- name: Download Cilium CLI archive
  ansible.builtin.get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-amd64.tar.gz"
    dest: /tmp/cilium-linux-amd64.tar.gz
    mode: "0644"
  when: not cilium_cli_stat.stat.exists

- name: Download Cilium CLI checksum
  ansible.builtin.get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-amd64.tar.gz.sha256sum"
    dest: /tmp/cilium-linux-amd64.tar.gz.sha256sum
    mode: "0644"
  when: not cilium_cli_stat.stat.exists

- name: Verify Cilium CLI checksum
  ansible.builtin.command: sha256sum --check /tmp/cilium-linux-amd64.tar.gz.sha256sum
  args:
    chdir: /tmp
  changed_when: false
  when: not cilium_cli_stat.stat.exists

- name: Extract Cilium CLI binary
  ansible.builtin.unarchive:
    src: /tmp/cilium-linux-amd64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
  when: not cilium_cli_stat.stat.exists

- name: Remove Cilium CLI install artefacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/cilium-linux-amd64.tar.gz
    - /tmp/cilium-linux-amd64.tar.gz.sha256sum
  when: not cilium_cli_stat.stat.exists

- name: Verify Cilium cluster status
  ansible.builtin.command: "{{ cilium_cli_binary }} status --wait"
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_verify
  retries: 3
  delay: 30
  until: cilium_verify.rc == 0

- name: Show Cilium status output
  ansible.builtin.debug:
    var: cilium_verify.stdout_lines
