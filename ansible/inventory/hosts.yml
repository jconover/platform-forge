---
all:
  children:
    masters:
      hosts:
        k8s-master-01:
          ansible_host: 192.168.68.93
    workers:
      hosts:
        k8s-worker-01:
          ansible_host: 192.168.68.84
        k8s-worker-02:
          ansible_host: 192.168.68.88
  vars:
    ansible_user: justin
    ansible_become: true
    # Kubernetes version (without patch, used as apt prefix e.g. "1.34")
    kubernetes_version: "1.34"
    # Network CIDRs - must not overlap with your LAN
    pod_cidr: "10.244.0.0/16"
    service_cidr: "10.96.0.0/12"
    # Directory to store fetched kubeconfig on the controller
    local_kubeconfig_path: "{{ playbook_dir }}/../kubeconfig"
