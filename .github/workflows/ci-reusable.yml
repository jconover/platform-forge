name: CI Reusable

on:
  workflow_call:
    inputs:
      service_name:
        description: "Short service name (api-gateway, backend-api, worker)"
        required: true
        type: string
      service_path:
        description: "Path to the service directory relative to repo root"
        required: true
        type: string
      language:
        description: "Primary language: go or python"
        required: true
        type: string

permissions:
  contents: write       # to commit manifest updates
  packages: write       # to push container images to ghcr.io
  id-token: write       # for OIDC if needed in future

jobs:
  test-and-build:
    name: Test, Build & Push (${{ inputs.service_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Go setup ----------------------------------------------------------
      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service_path }}/src/go.sum

      - name: Go mod tidy
        if: inputs.language == 'go'
        working-directory: ${{ inputs.service_path }}/src
        run: go mod tidy

      - name: Go test
        if: inputs.language == 'go'
        working-directory: ${{ inputs.service_path }}/src
        run: go test -v -race -count=1 ./...

      # ---- Python setup ------------------------------------------------------
      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ inputs.service_path }}/requirements.txt

      - name: Install Python dependencies
        if: inputs.language == 'python'
        working-directory: ${{ inputs.service_path }}
        run: pip install -r requirements.txt

      - name: Python test
        if: inputs.language == 'python'
        working-directory: ${{ inputs.service_path }}/src
        run: pytest -v

      # ---- Docker build & push -----------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/platform-forge/${{ inputs.service_name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/platform-forge/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ---- Update k8s manifest -----------------------------------------------
      - name: Update deployment image tag
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
        run: |
          MANIFEST="k8s/apps/${SERVICE_NAME}/deployment.yaml"
          NEW_IMAGE="ghcr.io/${REPO_OWNER}/platform-forge/${SERVICE_NAME}:${GIT_SHA}"

          sed -i "s|image: ghcr.io/.*/platform-forge/${SERVICE_NAME}:.*|image: ${NEW_IMAGE}|g" "${MANIFEST}"

          echo "Updated ${MANIFEST} to ${NEW_IMAGE}"
          grep "image:" "${MANIFEST}"

      - name: Commit and push manifest update
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "k8s/apps/${SERVICE_NAME}/deployment.yaml"

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci(${SERVICE_NAME}): update image to ${GIT_SHA}" \
                        -m "[skip ci]"
            git push
          fi
