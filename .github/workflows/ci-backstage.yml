name: CI - backstage

on:
  push:
    branches:
      - main
    paths:
      - "apps/backstage/**"
      - ".github/workflows/ci-backstage.yml"

  pull_request:
    branches:
      - main
    paths:
      - "apps/backstage/**"

  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Push Backstage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/backstage
          file: apps/backstage/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/platform-forge/backstage:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/platform-forge/backstage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
