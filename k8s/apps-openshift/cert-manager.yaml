# ArgoCD Application — cert-manager (OpenShift)
# Uses values-openshift.yaml overlay to remove hardcoded UIDs
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: "v1.14.x"
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/k8s/cert-manager/values.yaml
          - $values/k8s/cert-manager/values-openshift.yaml
    - repoURL: https://github.com/jconover/platform-forge.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
