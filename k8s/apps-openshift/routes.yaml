# ArgoCD Application — OpenShift Routes
# Deploys Route manifests for ArgoCD, Backstage, and Liqo
# These replace the Ingress resources used on vanilla K8s
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-routes
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jconover/platform-forge.git
    targetRevision: main
    path: k8s/apps-openshift/routes
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
