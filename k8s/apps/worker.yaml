# ArgoCD Application — worker
# Deploys the worker Deployment that KEDA scales based on CPU utilization.
# Raw manifests live in k8s/apps/worker/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/platform-forge.git
    targetRevision: main
    path: k8s/apps/worker
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
