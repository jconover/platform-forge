# NOTE: This HPA will be replaced by a KEDA ScaledObject in Phase 6.
# It is kept here as a baseline so the deployment scales before KEDA is installed.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: default
  labels:
    app: worker
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: idp-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
