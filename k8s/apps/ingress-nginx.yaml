# ArgoCD Application — ingress-nginx
# Provides the HTTP/HTTPS ingress controller for bare-metal NodePort access
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: "4.x"
      helm:
        releaseName: ingress-nginx
        valueFiles:
          - $values/k8s/ingress-nginx/values.yaml
    - repoURL: https://github.com/OWNER/platform-forge.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
